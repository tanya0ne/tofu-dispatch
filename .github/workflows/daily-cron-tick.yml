name: Daily cron tick

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/tick
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://tofu-dispatch.up.railway.app/api/cron/tick
